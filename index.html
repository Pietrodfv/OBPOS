      const renderSuperAdminLogin = () => {
        const handleSuperSubmit = async (e) => {
          e.preventDefault();
          const cleanUser = superAdminUser.trim().toLowerCase();
          const cleanPass = superAdminPass.trim();

          if (cleanUser !== 'superadmin' || !cleanPass) {
            setSuperAdminError('Credenciales del Super Administrador incorrectas.');
            return;
          }

          setSuperAdminError('');

          try {
            const authResponse = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
              method: 'POST',
              headers: {
                'apikey': SUPABASE_PUBLISHABLE_KEY,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                email: 'pietrosdiego1@gmail.com',
                password: cleanPass
              })
            });

            const authData = await authResponse.json();
            if (!authResponse.ok || !authData.access_token) {
              setSuperAdminError('Credenciales del Super Administrador incorrectas.');
              return;
            }

            const headers = {
              'apikey': SUPABASE_PUBLISHABLE_KEY,
              'Authorization': `Bearer ${authData.access_token}`
            };

            const verifyResponse = await fetch(
              `${SUPABASE_URL}/rest/v1/super_admins?auth_user_id=eq.${encodeURIComponent(authData.user.id)}&activo=eq.true&select=id,nombre,activo`,
              { headers }
            );
            const verifyRows = await verifyResponse.json();

            if (!verifyResponse.ok || !Array.isArray(verifyRows) || verifyRows.length === 0) {
              setSuperAdminError('Esta cuenta no tiene permisos de Super Administrador.');
              return;
            }

            const [companiesResponse, licensesResponse, profilesResponse, salesResponse, expensesResponse] = await Promise.all([
              fetch(`${SUPABASE_URL}/rest/v1/empresas?select=id,nombre,responsable,telefono,ciudad,password,estado,plan,fecha_creacion&order=id.asc`, { headers }),
              fetch(`${SUPABASE_URL}/rest/v1/licencias?select=empresa_id,fecha_inicio,fecha_vencimiento,estado`, { headers }),
              fetch(`${SUPABASE_URL}/rest/v1/perfiles?select=id,empresa_id,nombre,rol,password&order=id.asc`, { headers }),
              fetch(`${SUPABASE_URL}/rest/v1/ventas?select=empresa_id,total,fecha_venta`, { headers }),
              fetch(`${SUPABASE_URL}/rest/v1/gastos?select=empresa_id,monto,fecha_gasto`, { headers })
            ]);

            const cloudCompanies = await companiesResponse.json();
            const cloudLicenses = await licensesResponse.json();
            const cloudProfilesData = await profilesResponse.json();
            const allSales = await salesResponse.json();
            const allExpenses = await expensesResponse.json();

            if (!companiesResponse.ok || !licensesResponse.ok || !profilesResponse.ok || !salesResponse.ok || !expensesResponse.ok) {
              setSuperAdminError('No se pudieron cargar los datos del panel desde la nube.');
              return;
            }

            const nowMetrics = new Date();
            const sameDay = value => {
              const d = new Date(value);
              return d.getFullYear() === nowMetrics.getFullYear() &&
                     d.getMonth() === nowMetrics.getMonth() &&
                     d.getDate() === nowMetrics.getDate();
            };
            const sameMonth = value => {
              const d = new Date(value);
              return d.getFullYear() === nowMetrics.getFullYear() &&
                     d.getMonth() === nowMetrics.getMonth();
            };
            const ventasHoy = allSales.filter(v => sameDay(v.fecha_venta)).reduce((s, v) => s + (Number(v.total) || 0), 0);
            const ventasMes = allSales.filter(v => sameMonth(v.fecha_venta)).reduce((s, v) => s + (Number(v.total) || 0), 0);
            const gastosMes = allExpenses.filter(g => sameMonth(g.fecha_gasto)).reduce((s, g) => s + (Number(g.monto) || 0), 0);
            setSuperAdminMetrics({ ventasHoy, ventasMes, gastosMes, balanceMes: ventasMes - gastosMes });

            const metricsByCompany = {};
            cloudCompanies.forEach(company => {
              const cs = allSales.filter(v => v.empresa_id === company.id);
              const ce = allExpenses.filter(g => g.empresa_id === company.id);
              const vh = cs.filter(v => sameDay(v.fecha_venta)).reduce((s, v) => s + (Number(v.total) || 0), 0);
              const vm = cs.filter(v => sameMonth(v.fecha_venta)).reduce((s, v) => s + (Number(v.total) || 0), 0);
              const gm = ce.filter(g => sameMonth(g.fecha_gasto)).reduce((s, g) => s + (Number(g.monto) || 0), 0);
              const dates = [...cs.map(v => v.fecha_venta), ...ce.map(g => g.fecha_gasto)]
                .filter(Boolean).sort((a, b) => new Date(b) - new Date(a));
              metricsByCompany[company.id] = {
                ventasHoy: vh, ventasMes: vm, gastosMes: gm,
                balanceMes: vm - gm, ultimaActividad: dates[0] || null
              };
            });
            setCompanyCloudMetrics(metricsByCompany);

            const mappedCompanies = cloudCompanies.map(company => {
              const license = cloudLicenses.find(l => l.empresa_id === company.id);
              const profiles = cloudProfilesData.filter(p => p.empresa_id === company.id);
              const adminProfile = profiles.find(p => p.rol === 'Administrador');
              const cashierProfile = profiles.find(p => p.rol === 'Cajero');
              const days = license?.fecha_vencimiento
                ? calculateRemainingDays(license.fecha_vencimiento)
                : 0;

              return {
                ...company,
                dias: days,
                fechaVencimiento: license?.fecha_vencimiento || null,
                estado: company.estado === 'SUSPENDIDA'
                  ? 'SUSPENDIDA'
                  : (days > 0 ? 'ACTIVA' : 'VENCIDA'),
                cajeroNombre: cashierProfile?.nombre || 'CAJERO',
                adminNombre: adminProfile?.nombre || 'ADM',
                adminPin: adminProfile?.password || ''
              };
            });

            setCompanies(mappedCompanies);
            sessionStorage.setItem('obelisco_superadmin_active', 'true');
            sessionStorage.setItem('obpos_superadmin_access_token', authData.access_token);
            sessionStorage.setItem('obpos_superadmin_refresh_token', authData.refresh_token || '');
            setIsSuperAdminLoggedIn(true);
            setSuperAdminError('');
            setShowSuperAdminLogin(false);
            showToast('Super Admin conectado a la nube', 'success');

          )}

          {/* ==========================================================
             MODALS SECTION
             ========================================================== */}
          
          {/* PROFESSIONAL POST-SALE PRINT OPTIONS OVERLAY MODAL */}
          {isPrintModalOpen && lastSavedSale && (
            <div className="fixed inset-0 bg-brand-black/95 backdrop-blur-sm flex items-center justify-center p-4 z-50 fade-in">
              <div className="bg-brand-dark border border-zinc-800 rounded-2xl w-full max-w-md overflow-hidden shadow-2xl font-mono text-left">
                <div className="p-5 border-b border-zinc-800 bg-brand-black/20 text-center">
                  <h4 className="font-black text-sm uppercase tracking-wider text-white">🖨 IMPRESIÓN DE COMPROBANTES</h4>
                </div>
                
                <div className="p-6 space-y-4 text-xs text-zinc-300">
                  <div className="bg-brand-black/40 border border-zinc-800 p-3 rounded-xl space-y-1">
                    <div className="flex justify-between">
                      <span>Mesa / Cliente:</span>
                      <span className="font-bold text-white uppercase">{lastSavedSale.clienteMesa}</span>
                    </div>
                    <div className="flex justify-between">
                      <span>Total Venta:</span>
                      <span className="font-bold text-brand-red">{lastSavedSale.total} Bs</span>
                    </div>
                  </div>

                  <div className="space-y-2">
                    <button
                      onClick={() => triggerPrint('ticket', lastSavedSale)}
                      className="w-full bg-brand-gray hover:bg-zinc-800 border border-zinc-700 text-white font-bold py-3 px-4 rounded-xl flex items-center justify-between transition-all active-scale"
                    >
                      <span>🖨 Imprimir Ticket Cliente</span>
                    </button>

                    <button
                      onClick={() => triggerPrint('comanda', lastSavedSale)}
                      className="w-full bg-brand-gray hover:bg-zinc-800 border border-zinc-700 text-white font-bold py-3 px-4 rounded-xl flex items-center justify-between transition-all active-scale"
                    >
                      <span>🍳 Imprimir Comanda Cocina</span>
                    </button>
                  </div>
                </div>

                <div className="p-4 border-t border-zinc-800 bg-brand-black/40 flex justify-end">
                  <button
                    onClick={() => {
                      setIsPrintModalOpen(false);
                      handleNewSale();
                    }}
                    className="bg-brand-red text-white text-xs font-black py-2.5 px-6 rounded-xl active-scale"
                  >
                    ❌ Cerrar e Iniciar Nueva Venta
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* OPEN REGISTER DIALOG MODAL */}
          {isOpeningRegisterOpen && (
            <div className="fixed inset-0 bg-brand-black/95 flex items-center justify-center p-4 z-50 fade-in text-left">
              <div className="bg-brand-dark border border-zinc-800 rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl font-mono">
                <div className="p-5 border-b border-zinc-800 bg-brand-black/20 text-center">
                  <h4 className="font-black text-sm uppercase tracking-wider text-white">💰 APERTURA DE CAJA DIARIA</h4>
                </div>
                <div className="p-6 space-y-4 text-xs">
                  <div>
                    <label className="text-[9px] uppercase font-bold text-zinc-500 block mb-1">Monto Inicial (Bs)</label>
                    <input
                      type="number"
                      value={montoInicialInput}
                      onChange={(e) => setMontoInicialInput(e.target.value)}
                      className="w-full bg-brand-gray border border-zinc-700 rounded-xl p-3 text-sm font-black text-center text-white focus:outline-none"
                    />
                  </div>
                </div>
                <div className="p-4 border-t border-zinc-800 bg-brand-black/40 flex justify-end gap-2">
                  <button
                    onClick={handleOpenRegister}
                    className="bg-brand-red hover:bg-brand-lightRed text-white text-xs font-black py-2.5 px-6 rounded-xl active-scale"
                  >
                    Confirmar Apertura
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* CLOSING / CASH COUNT REGISTER DIALOG MODAL */}
          {isClosingRegisterOpen && filteredActiveRegister && (
            <div className="fixed inset-0 bg-brand-black/95 flex items-center justify-center p-4 z-50 fade-in text-left">
              <div className="bg-brand-dark border border-zinc-800 rounded-2xl w-full max-w-md overflow-hidden shadow-2xl font-mono">
                <div className="p-5 border-b border-zinc-800 bg-brand-black/20 text-center">
                  <h4 className="font-black text-sm uppercase tracking-wider text-white">🔒 ARQUEO Y CIERRE DE TURNO</h4>
                </div>
                <div className="p-6 space-y-4 text-xs max-h-[80vh] overflow-y-auto no-scrollbar">
                  <div>
                    <label className="text-[10px] uppercase font-bold text-zinc-500 block mb-1">Efectivo Físico Contado (Bs)</label>
                    <input
                      type="number"
                      placeholder="Ingrese el monto arqueado..."
                      value={dineroContadoInput}
                      onChange={(e) => setDineroContadoInput(e.target.value)}
                      className="w-full bg-brand-gray border border-zinc-700 rounded-xl p-3 text-sm font-black text-center text-white focus:outline-none"
                    />
                  </div>
                </div>
                <div className="p-4 border-t border-zinc-800 bg-brand-black/40 flex justify-end gap-2">
                  <button
                    onClick={() => setIsClosingRegisterOpen(false)}
                    className="bg-brand-gray text-white text-xs font-bold py-2 px-4 rounded-xl active-scale"
                  >
                    Atrás
                  </button>
                  <button
                    onClick={handleCloseRegister}
                    className="bg-brand-red hover:bg-brand-lightRed text-white text-xs font-black py-2.5 px-6 rounded-xl active-scale"
                  >
                    Registrar Cierre
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* CHECKOUT / BILL DIALOG MODAL */}
          {isCheckoutOpen && (
            <div className="fixed inset-0 bg-brand-black/90 backdrop-blur-sm flex items-center justify-center p-4 z-50 fade-in text-left font-mono">
              <div className="bg-brand-dark border border-zinc-800 rounded-2xl w-full max-w-lg overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
                <div className="p-5 border-b border-zinc-800 flex justify-between items-center bg-brand-black/40">
                  <h4 className="font-black text-xs uppercase tracking-wider text-white">
                    💵 {isSavingSale ? 'Guardando...' : 'Confirmar Venta'}
                  </h4>
                  <button onClick={() => setIsCheckoutOpen(false)} className="text-zinc-400 hover:text-white">✕</button>
                </div>

                <div className="p-6 overflow-y-auto space-y-6 no-scrollbar flex-1">
                  <div className="bg-brand-black/40 border border-zinc-800 rounded-xl p-3 flex justify-between items-center text-xs">
                    <div>
                      <p className="text-zinc-400 font-bold">📍 Mesa/Cliente:</p>
                      <p className="text-white font-black uppercase text-sm mt-0.5">{customerTag.trim() || 'Venta Rápida'}</p>
                    </div>
                    <div className="text-right">
                      <p className="text-zinc-400 font-bold">Total:</p>
                      <p className="text-brand-red font-black text-base mt-0.5">{cartTotal} Bs</p>
                    </div>
                  </div>

                  <div>
                    <label className="text-[10px] font-black uppercase tracking-wider text-zinc-500 mb-2 block">Método de Cobro</label>
                    <div className="grid grid-cols-2 sm:grid-cols-4 gap-2">
                      {['Efectivo', 'QR', 'Tarjeta', 'Transferencia'].map(m => (
                        <button
                          key={m}
                          onClick={() => {
                            setPaymentMethod(m);
                            if (m !== 'Efectivo') setCashReceived('');
                            else setCashReceived(cartTotal.toString());
                          }}
                          className={`py-3 px-2 rounded-xl text-xs font-bold transition-all active-scale ${
                            paymentMethod === m ? 'bg-brand-red text-white' : 'bg-brand-gray text-zinc-400'
                          }`}
                        >
                          {m}
                        </button>
                      ))}
                    </div>
                  </div>

                  {paymentMethod === 'Efectivo' && (
                    <div className="space-y-3 bg-brand-black/30 border border-zinc-800 p-4 rounded-xl fade-in">
                      <div className="grid grid-cols-2 gap-4">
                        <div>
                          <label className="text-[10px] font-black uppercase tracking-wider text-zinc-500 block mb-1">Monto Recibido</label>
                          <input
                            type="number"
                            value={cashReceived}
                            onChange={(e) => setCashReceived(e.target.value)}
                            className="w-full bg-brand-gray text-lg font-black border border-zinc-700 rounded-lg p-2 text-white focus:outline-none"
                          />
                        </div>
                        <div className="flex flex-col justify-end text-right">
                          <span className="text-[10px]">Cambio</span>
                          <span className="text-xl font-black text-green-500">{cashChange.toFixed(2)} Bs</span>
                        </div>
                      </div>
                    </div>
                  )}
                </div>

                <div className="p-4 border-t border-zinc-800 bg-brand-black/40 flex justify-end gap-2 shrink-0">
                  <button onClick={() => setIsCheckoutOpen(false)} className="bg-brand-gray text-white text-xs font-bold py-2.5 px-4 rounded-xl active-scale font-sans">Regresar</button>
                  <button
                    onClick={handleSaveSale}
                    disabled={isSavingSale}
                    disabled={paymentMethod === 'Efectivo' && (parseFloat(cashReceived) < cartTotal || isNaN(parseFloat(cashReceived)))}
                    className="bg-brand-red hover:bg-brand-lightRed text-white text-xs font-black py-2.5 px-6 rounded-xl active-scale font-sans"
                  >
                    COBRAR Y GUARDAR VENTA ✓
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* RE-ENGINEERED HISTORIAL LOG RECORD MODAL WITH 3 ACTIONS */}
          {selectedHistorySale && (
            <div className="fixed inset-0 bg-brand-black/90 backdrop-blur-sm flex items-center justify-center p-4 z-50 fade-in font-mono text-left">
              <div className="bg-brand-dark border border-zinc-800 rounded-2xl w-full max-w-md overflow-hidden shadow-2xl">
                <div className="p-5 border-b border-zinc-800 bg-brand-black/40 flex justify-between items-center">
                  <h4 className="font-black text-xs uppercase tracking-wider text-white">🧾 Detalle de Ticket #{selectedHistorySale.id}</h4>
                  <button onClick={() => setSelectedHistorySale(null)} className="text-zinc-500 hover:text-white">✕</button>
                </div>
                <div className="p-6 space-y-4 text-xs max-h-[70vh] overflow-y-auto no-scrollbar">
                  <div className="grid grid-cols-2 gap-2 text-zinc-400">
                    <div>Fecha: <span className="text-white font-bold">{selectedHistorySale.fecha}</span></div>
                    <div>Hora: <span className="text-white font-bold">{selectedHistorySale.hora}</span></div>
                    <div>Atendido por: <span className="text-white font-bold">{selectedHistorySale.usuario}</span></div>
                    <div>Estado: <span className="text-white font-bold uppercase">{selectedHistorySale.status || 'COMPLETA'}</span></div>
                  </div>
                  
                  <div className="border-t border-zinc-800 pt-2 space-y-1.5">
                    <span className="font-bold text-[10px] text-zinc-500 uppercase tracking-wider font-sans">Productos</span>
                    {selectedHistorySale.productos.map((p, i) => (
                      <div key={i} className="flex justify-between">
                        <span>{p.cantidad}x {p.nombre}</span>
                        <span>{p.subtotal} Bs</span>
                      </div>
                    ))}
                  </div>

                  <div className="border-t border-zinc-800 pt-3 space-y-2">
                    <span className="font-bold text-[10px] text-zinc-500 uppercase tracking-wider font-sans">Acciones Profesionales de Impresión</span>
                    <div className="grid grid-cols-2 gap-2 text-[11px] font-sans">
                      <button
                        onClick={() => triggerPrint('ticket', selectedHistorySale)}
                        className="bg-brand-gray hover:bg-zinc-800 border border-zinc-700 text-white font-bold py-2 px-3 rounded-lg flex items-center justify-center gap-1.5 active-scale"
                      >
                        🖨 Reimprimir Ticket
                      </button>
                      <button
                        onClick={() => triggerPrint('comanda', selectedHistorySale)}
                        className="bg-brand-gray hover:bg-zinc-800 border border-zinc-700 text-white font-bold py-2 px-3 rounded-lg flex items-center justify-center gap-1.5 active-scale"
                      >
                        🍳 Reimprimir Comanda
                      </button>
                    </div>
                  </div>
                </div>
                <div className="p-4 border-t border-zinc-800 bg-brand-black/40 flex justify-end font-sans">
                  <button 
                    onClick={() => {
                      setSelectedHistorySale(null);
                    }}
                    className="bg-brand-red text-white text-xs font-bold py-2 px-6 rounded-xl active-scale"
                  >
                    Cerrar
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* CONFIRMATION DIALOG MODAL */}
          {confirmModal.open && (
            <div className="fixed inset-0 bg-brand-black/90 backdrop-blur-sm flex items-center justify-center p-4 z-50 fade-in text-left font-mono">
              <div className="bg-brand-dark border border-zinc-800 rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl">
                <div className="p-5 border-b border-zinc-800 bg-brand-black/20">
                  <h4 className="font-black text-xs uppercase tracking-wider text-white">⚠️ {confirmModal.title}</h4>
                </div>
                <div className="p-5 text-xs text-zinc-300">{confirmModal.message}</div>
                <div className="p-4 border-t border-zinc-800 bg-brand-black/40 flex justify-end gap-2 font-sans">
                  <button onClick={() => setConfirmModal(prev => ({ ...prev, open: false }))} className="bg-brand-gray text-white text-xs font-bold py-2 px-4 rounded-xl active-scale">{confirmModal.cancelText}</button>
                  <button onClick={confirmModal.onConfirm} className="bg-brand-red text-white text-xs font-black py-2 px-4 rounded-xl active-scale">{confirmModal.confirmText}</button>
                </div>
              </div>
            </div>
          )}

          {/* PASSWORD VERIFICATION MODAL FOR ADM */}
          {isPassModalOpen && (
            <div className="fixed inset-0 bg-brand-black/90 backdrop-blur-sm flex items-center justify-center p-4 z-50 fade-in text-left font-mono">
              <div className="bg-brand-dark border border-zinc-800 rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl">
                <div className="p-5 border-b border-zinc-800 bg-brand-black/20 flex justify-between items-center">
                  <h4 className="font-black text-xs uppercase tracking-wider text-white">🔒 Acceso de Administrador</h4>
                  <button onClick={() => { setIsPassModalOpen(false); setPasswordInput(''); setPasswordError(false); }} className="text-zinc-400 hover:text-white">✕</button>
                </div>
                
                <form onSubmit={handlePasswordSubmit}>
                  <div className="p-5 space-y-4">
                    <p className="text-xs text-zinc-400">El perfil ADM requiere contraseña.</p>
                    <input
                      type="password"
                      placeholder="Ingresa la contraseña"
                      value={passwordInput}
                      onChange={(e) => setPasswordInput(e.target.value)}
                      className="w-full bg-brand-gray border rounded-xl p-3 text-sm text-white focus:outline-none"
                      autoFocus
                      required
                    />
                    {passwordError && <p className="text-brand-red text-[10px] font-bold">Contraseña incorrecta.</p>}
                  </div>
                  <div className="p-4 border-t border-zinc-800 bg-brand-black/40 flex justify-end gap-2 font-sans">
                    <button type="submit" className="bg-brand-red text-white text-xs font-black py-2 px-6 rounded-xl active-scale">Ingresar</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* QUICK ALERT MODAL */}
          {alertModal.open && (
            <div className="fixed inset-0 bg-brand-black/90 backdrop-blur-sm flex items-center justify-center p-4 z-50 fade-in text-left font-mono">
              <div className="bg-brand-dark border border-zinc-800 rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl">
                <div className="p-5 border-b border-zinc-800 bg-brand-black/20">
                  <h4 className="font-black text-xs uppercase tracking-wider text-brand-red">🚨 {alertModal.title}</h4>
                </div>
                <div className="p-5 text-xs text-zinc-300 leading-relaxed">{alertModal.message}</div>
                <div className="p-4 border-t border-zinc-800 bg-brand-black/40 flex justify-end font-sans">
                  <button onClick={() => setAlertModal(prev => ({ ...prev, open: false }))} className="bg-brand-gray text-white text-xs font-black py-2 px-6 rounded-xl active-scale">Entendido</button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
