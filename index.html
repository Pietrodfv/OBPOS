        e.preventDefault();
        if (!licenseModal) return;

        const amount = Math.floor(Number(licenseDaysInput));
        if (!Number.isFinite(amount) || amount <= 0) {
          showToast('Ingresa una cantidad válida de días', 'error');
          return;
        }

        const company = companies.find(c => c.id === licenseModal.companyId);
        if (!company) return;

        const now = Date.now();
        const currentExpiry = company.fechaVencimiento
          ? new Date(company.fechaVencimiento).getTime()
          : now;
        const delta = amount * 24 * 60 * 60 * 1000;

        const nextExpiryMs = licenseModal.action === 'ADD'
          ? Math.max(now, currentExpiry) + delta
          : Math.max(now, currentExpiry - delta);

        const nextExpiry = new Date(nextExpiryMs).toISOString();
        const nextDays = Math.max(0, Math.ceil((nextExpiryMs - now) / (24 * 60 * 60 * 1000)));
        const nextLicenseState = nextDays > 0 ? 'ACTIVA' : 'VENCIDA';

        try {
          const response = await fetch(
            `${SUPABASE_URL}/rest/v1/licencias?empresa_id=eq.${encodeURIComponent(company.id)}`,
            {
              method: 'PATCH',
              headers: getSuperAdminCloudHeaders(),
              body: JSON.stringify({
                fecha_vencimiento: nextExpiry,
                estado: nextLicenseState
              })
            }
          );

          if (!response.ok) {
            showToast('No se pudo actualizar la licencia en la nube', 'error');
            return;
          }

            c.id === company.id

                  estado: c.estado === 'SUSPENDIDA' ? 'SUSPENDIDA' : nextLicenseState

          showAlert('Acceso Denegado', `El perfil actual (${currentUser?.nombre || 'Desconocido'} - ${currentUser?.rol || 'Ninguno'}) no tiene autorización para ingresar a ${tabName}. Se requieren permisos de administrador.`);

        if (targetUser?.email) {
          try {
            const response = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
              method: 'POST',
              headers: {
                'apikey': SUPABASE_PUBLISHABLE_KEY,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                email: targetUser.email,
                password: enteredPassword
              })
            });

            const authData = await response.json();

            if (!response.ok || !authData.access_token) {
              setPasswordError(true);
              showToast('Contraseña incorrecta', 'error');
              return;
            }

            sessionStorage.setItem('obpos_cloud_access_token', authData.access_token);
            sessionStorage.setItem('obpos_cloud_refresh_token', authData.refresh_token || '');
            setCurrentUser(targetUser);
            setIsLoggedIn(true);
            setIsPassModalOpen(false);

            setActiveTab('VENTAS');

      const getProductCost = (productName) => {
        const match = activeCompanyProducts.find(p => p && p.nombre === productName);
        if (match && match.costo) return parseFloat(match.costo);

        const recipes = RECIPES[productName] || [];
        if (recipes.length === 0) return 3; 
        return recipes.reduce((acc, curr) => {
          const ing = activeCompanyIngredients.find(i => i && i.id === curr.ingredienteId);
          const unitCost = ing ? parseFloat(ing.costoUnitario || 2) : 2;
          return acc + (curr.cantidad * unitCost);
        }, 0);

      // ANALYTICS & STATS PROCESSING WITH ROBUST GUARDS
      const salesAnalytics = useMemo(() => {
        let todaySales = 0;
        let weekSales = 0;
        let monthSales = 0;
        let totalUtility = 0;
        const productCounts = {};
        const paymentCounts = {};
        
        const now = new Date();
        const todayStr = now.toLocaleDateString('es-BO');

        const startOfWeek = new Date();
        startOfWeek.setDate(now.getDate() - now.getDay());
        startOfWeek.setHours(0,0,0,0);

        const targetedSales = (activeCompanySales || []).filter(sale => {
          if (!sale) return false;
          if (sale.status === 'ANULADA') return false;
          if (currentUser?.rol === 'Cajero' && sale.usuario !== currentUser?.nombre && !isSuperAdminLoggedIn) return false;
          return true;
        });

        targetedSales.forEach(sale => {
          const saleDateObj = new Date(sale.rawDate || Date.now());

          if (sale.fecha === todayStr) {
            todaySales += (sale.total || 0);
          }
          if (saleDateObj >= startOfWeek) {
            weekSales += (sale.total || 0);
          }
          monthSales += (sale.total || 0);

          let saleCost = 0;
          (sale.productos || []).forEach(p => {
            if (!p) return;
            const cost = p.costo || getProductCost(p.nombre);
            saleCost += (cost * p.cantidad);
            productCounts[p.nombre] = (productCounts[p.nombre] || 0) + p.cantidad;
          });
          
          totalUtility += ((sale.total || 0) - saleCost);
          if (sale.metodoPago) {
            paymentCounts[sale.metodoPago] = (paymentCounts[sale.metodoPago] || 0) + 1;
          }
        });

        const totalExpenses = (currentUser?.rol === 'Administrador' || isSuperAdminLoggedIn)
          ? (activeCompanyExpenses || []).reduce((acc, curr) => acc + parseFloat(curr?.monto || 0), 0)
          : 0;
        const realUtility = totalUtility - totalExpenses;

        let bestSeller = "N/A";
        let maxQty = 0;
        Object.entries(productCounts).forEach(([name, qty]) => {
          if (qty > maxQty) {
            maxQty = qty;
            bestSeller = name;
          }
        });

        let favoritePayment = "N/A";
        let maxPayCount = 0;
        Object.entries(paymentCounts).forEach(([method, count]) => {
          if (count > maxPayCount) {
            maxPayCount = count;
            favoritePayment = method;
          }
        });

        const avgTicket = targetedSales.length > 0 ? (targetedSales.reduce((acc, s) => acc + (s.total || 0), 0) / targetedSales.length) : 0;

        let lowStockIng = "N/A";
        if (currentUser?.rol === 'Administrador' || isSuperAdminLoggedIn) {
          let minStockLevel = Infinity;
          (activeCompanyIngredients || []).forEach(i => {
            if (i && i.stock < minStockLevel) {
              minStockLevel = i.stock;
              lowStockIng = `${i.nombre} (${i.stock} ${i.unidad})`;
            }
          });
        }

        const todayProductCounts = {};
        targetedSales.filter(s => s && s.fecha === todayStr).forEach(s => {
          (s.productos || []).forEach(p => {
            if (p && p.nombre) {
              todayProductCounts[p.nombre] = (todayProductCounts[p.nombre] || 0) + p.cantidad;
            }
          });
        });
        let bestSellerToday = "N/A";
        let maxTodayQty = 0;
        Object.entries(todayProductCounts).forEach(([name, qty]) => {
          if (qty > maxTodayQty) {
            maxTodayQty = qty;
            bestSellerToday = name;
          }
        });

        return {
          todaySales,
          weekSales,
          monthSales,
          totalUtility,
          realUtility,
          totalExpenses,
          bestSeller,
          bestSellerToday,
          saleCount: targetedSales.length,
          avgTicket,
          productCounts,
          favoritePayment,
          lowStockIng,
          targetedSales

              fecha_apertura: timestamp.toISOString(),
              monto_inicial: amount,
              estado: 'ABIERTA'
            })
          });

          if (!response.ok || !Array.isArray(rows) || rows.length === 0) {

            return;

            id: cloudRow.id,
            cloudId: cloudRow.id,
            empresaId: activeCompanyId,
            fecha: timestamp.toLocaleDateString('es-BO'),
            hora: timestamp.toLocaleTimeString('es-BO', { hour: '2-digit', minute: '2-digit' }),
            rawDate: cloudRow.fecha_apertura || timestamp.toISOString(),
            montoInicial: Number(cloudRow.monto_inicial) || amount,
            abiertoPor: cloudRow.cajero_nombre || currentUser?.nombre || 'Desconocido',
            ventas: [],
            egresos: [],
            estado: 'ABIERTA'
          };

          setActiveRegister(newRegister);
          setIsOpeningRegisterOpen(false);
          setMontoInicialInput('');
          logAction(`Apertura de turno de caja con Bs ${amount}`);
          showToast('Caja abierta y guardada en la nube', 'success');
        } catch (error) {
          showToast('Error de conexión al abrir la caja', 'error');
        }
      };

      const handleCloseRegister = async () => {
        const realCash = parseFloat(dineroContadoInput);
        if (isNaN(realCash) || realCash < 0) {
          showToast('Ingresa un recuento físico válido', 'error');
          return;
        }

        const now = new Date();
        const openedAt = new Date(filteredActiveRegister.rawDate);

        const periodSales = activeCompanySales.filter(s => new Date(s.rawDate) >= openedAt && s.status !== 'ANULADA');
        const periodExpenses = activeCompanyExpenses.filter(e => new Date(e.fecha) >= openedAt);

        const totalCashSales = periodSales.filter(s => s && s.metodoPago === 'Efectivo').reduce((acc, s) => acc + s.total, 0);
        const totalQRSales = periodSales.filter(s => s && s.metodoPago === 'QR').reduce((acc, s) => acc + s.total, 0);
        const totalCardSales = periodSales.filter(s => s && s.metodoPago === 'Tarjeta').reduce((acc, s) => acc + s.total, 0);
        const totalTransfSales = periodSales.filter(s => s && s.metodoPago === 'Transferencia').reduce((acc, s) => acc + s.total, 0);
        const totalPeriodExpenses = periodExpenses.reduce((acc, e) => acc + e.monto, 0);

        const expectedCash = filteredActiveRegister.montoInicial + totalCashSales - totalPeriodExpenses;
        const diff = realCash - expectedCash;

        try {
          const response = await fetch(
            `${SUPABASE_URL}/rest/v1/cierres_caja?id=eq.${encodeURIComponent(filteredActiveRegister.cloudId || filteredActiveRegister.id)}&empresa_id=eq.${encodeURIComponent(activeCompanyId)}`,
            {
              method: 'PATCH',
              headers: getCloudHeaders(),
              body: JSON.stringify({
                fecha_cierre: now.toISOString(),
                ventas_efectivo: totalCashSales,
                efectivo_esperado: expectedCash,
                efectivo_contado: realCash,
                diferencia: diff,
                estado: 'CERRADA'
              })
            }
          );

          if (!response.ok) {
            showToast('No se pudo cerrar la caja en la nube', 'error');
            return;
          }

          const closedRecord = {
            ...filteredActiveRegister,
            closedAt: now.toISOString(),
            cerradoPor: currentUser?.nombre || 'Desconocido',
            totalEfectivo: totalCashSales,
            totalQR: totalQRSales,
            totalTarjeta: totalCardSales,
            totalTransferencia: totalTransfSales,
            totalGastos: totalPeriodExpenses,
            montoEsperado: expectedCash,
            montoReal: realCash,
            diferencia: diff,
            estado: 'CERRADA'
          };

          setRegisterHistory(prev => [closedRecord, ...prev]);
          setActiveRegister(null);
          setIsClosingRegisterOpen(false);
          setDineroContadoInput('');
          logAction(`Cierre de turno de caja. Esperado: Bs ${expectedCash}, Contado: Bs ${realCash}, Diferencia: Bs ${diff}`);
          showToast('Caja cerrada y guardada en la nube', 'success');
        } catch (error) {
          showToast('Error de conexión al cerrar la caja', 'error');
        }
      };

      // CART ACTIONS
      const handleAddToCart = (product) => {
        if (!filteredActiveRegister) {
          showToast('Debes abrir el turno de caja antes de registrar ventas', 'warning');
          setIsOpeningRegisterOpen(true);
          return;
        }
        if (!product.disponible) {
          showToast(`El plato ${product.nombre} no se encuentra disponible`, 'warning');
          return;
        }
        setCart(prevCart => {
          const exists = prevCart.find(item => item.id === product.id);
          if (exists) {
            showToast(`Aumentado: ${product.nombre} (+1)`);
            return prevCart.map(item => 
              item.id === product.id ? { ...item, cantidad: item.cantidad + 1 } : item
            );
          }
          showToast(`${product.nombre} agregado al pedido`);
          return [...prevCart, { ...product, cantidad: 1 }];
        });
      };

      const handleIncrementQuantity = (productId) => {
        setCart(prevCart => 
          prevCart.map(item => 
            item.id === productId ? { ...item, cantidad: item.cantidad + 1 } : item
          )
        );
      };

      const handleDecrementQuantity = (productId) => {
        setCart(prevCart => {
          const item = prevCart.find(i => i.id === productId);
          if (item && item.cantidad === 1) { 
            return prevCart.filter(i => i.id !== productId);
          }
          return prevCart.map(i => 
            i.id === productId ? { ...i, cantidad: i.cantidad - 1 } : i
          );
        });
      };

      const handleRemoveProduct = (productId) => {
        const item = cart.find(i => i.id === productId);
        setCart(prevCart => prevCart.filter(item => item.id !== productId));
        if (item) showToast(`Eliminado: ${item.nombre}`);
      };

      const handleCancelSale = () => {
        if (cart.length === 0) return;
        showConfirmation(
          '¿Cancelar Venta Actual?',
          'Esta acción vaciará el carrito y borrará el progreso de esta orden.',
          () => {
            setCart([]);
            setDiscount(0);
            setCustomerTag('');
            showToast('Pedido cancelado', 'error');
            logAction('Cancelación de orden en pantalla de cobros');
          },
          'Sí, Cancelar'
        );
      };

      const handleNewSale = () => {
        setCart([]);
        setDiscount(0);
        setCashReceived('');
        setPaymentMethod('Efectivo');
        setCustomerTag('');
      };

      const cartSubtotal = useMemo(() => {
        return cart.reduce((acc, curr) => acc + (curr.precio * curr.cantidad), 0);
      }, [cart]);

      const cartTotalQuantity = useMemo(() => {
        return cart.reduce((acc, curr) => acc + curr.cantidad, 0);
      }, [cart]);

      const cartTotal = useMemo(() => {
        const res = cartSubtotal - discount;
        return res < 0 ? 0 : res;
      }, [cartSubtotal, discount]);

      const cashChange = useMemo(() => {
        if (!cashReceived || isNaN(parseFloat(cashReceived))) return 0;
        const diff = parseFloat(cashReceived) - cartTotal;
        return diff > 0 ? diff : 0;
      }, [cashReceived, cartTotal]);

      const handleSaveSale = async () => {
        if (isSavingSale) {
          showToast('La venta ya se está guardando', 'warning');
          return;
        }
        if (cart.length === 0) return;
        if (!filteredActiveRegister) {
          showToast('Turno de caja cerrado', 'error');
          return;
        }

        let outOfStockWarnings = [];
        cart.forEach(cartItem => {
          const recipe = RECIPES[cartItem.nombre];
          if (recipe) {
            recipe.forEach(recipeItem => {
              const ing = activeCompanyIngredients.find(i => i && i.id === recipeItem.ingredienteId);
              if (ing) {
                const required = recipeItem.cantidad * cartItem.cantidad;
                if (ing.stock < required) {
                  outOfStockWarnings.push(ing.nombre);
                }
              }
            });
          }
          if (cartItem.ingredienteAsociadoId) {
            const ing = activeCompanyIngredients.find(i => i && i.id === cartItem.ingredienteAsociadoId);
            if (ing) {
              const required = cartItem.cantidad; 
              if (ing.stock < required) {
                outOfStockWarnings.push(ing.nombre);
              }
            }
          }
        });

        if (outOfStockWarnings.length > 0) {
          showToast(`¡Bajo stock de ingredientes! Suministro crítico: ${[...new Set(outOfStockWarnings)].join(', ')}`, 'warning');
        }

        const timestamp = new Date();

        setIsSavingSale(true);
        let cloudSaleId = null;
        try {
          const saleResponse = await fetch(`${SUPABASE_URL}/rest/v1/ventas`, {
            method: 'POST',
            headers: {
              ...getCloudHeaders(),
              'Prefer': 'return=representation'
            },
            body: JSON.stringify({
              empresa_id: activeCompanyId,
              perfil_id: currentUser?.cloudId ? Number(currentUser.cloudId) : null,
              total: cartTotal,
              metodo_pago: paymentMethod,
              usuario_nombre: currentUser?.nombre || 'Desconocido',
              fecha_venta: timestamp.toISOString()
            })
          });

          const saleRows = await saleResponse.json();
          if (!saleResponse.ok || !Array.isArray(saleRows) || saleRows.length === 0) {
            showToast('No se pudo guardar la venta en la nube', 'error');
            setIsSavingSale(false);
            return;
          }

          cloudSaleId = saleRows[0].id;

          const detailRows = cart.map(item => ({
            venta_id: cloudSaleId,
            producto_id: item.cloudId || (
              String(item.id).startsWith('cloud-')
                ? Number(String(item.id).replace('cloud-', ''))
                : null
            ),
            producto_nombre: item.nombre,
            cantidad: item.cantidad,
            precio_unitario: item.precio,
            subtotal: item.precio * item.cantidad
          }));

          const detailResponse = await fetch(`${SUPABASE_URL}/rest/v1/detalle_ventas`, {
            method: 'POST',
            headers: getCloudHeaders(),
            body: JSON.stringify(detailRows)
          });

          if (!detailResponse.ok) {
            await fetch(
              `${SUPABASE_URL}/rest/v1/ventas?id=eq.${cloudSaleId}&empresa_id=eq.${encodeURIComponent(activeCompanyId)}`,
              { method: 'DELETE', headers: getCloudHeaders() }
            );
            showToast('No se pudo guardar el detalle de la venta en la nube', 'error');
            setIsSavingSale(false);
            return;
          }

          const deductions = {};
          cart.forEach(cartItem => {
            const productId = Number(cartItem.cloudId || String(cartItem.id).replace('cloud-', ''));
            cloudRecipes
              .filter(r => Number(r.producto_id) === productId)
              .forEach(r => {
                deductions[r.inventario_id] = (deductions[r.inventario_id] || 0) +
                  (Number(r.cantidad) * Number(cartItem.cantidad));
              });
          });

          for (const [inventoryId, portionsUsed] of Object.entries(deductions)) {
            const ingredient = activeCompanyIngredients.find(i =>
              Number(i.cloudId || String(i.id).replace('cloud-inv-', '')) === Number(inventoryId)
            );
            if (ingredient && portionsUsed > 0) {
              const yieldPerUnit = Number(
                ingredient.porciones_por_unidad ?? ingredient.porcionesPorUnidad ?? 1
              ) || 1;
              const stockUnitsToDeduct = Number(portionsUsed) / yieldPerUnit;
              await updateCloudInventoryStock(ingredient, -stockUnitsToDeduct, true);
            }
          }
        } catch (error) {
          showToast('Error de conexión. La venta no fue registrada.', 'error');
          setIsSavingSale(false);
          return;
        }

        const saleId = cloudSaleId;

        const saleRecord = {
          id: saleId,
          empresaId: activeCompanyId,
          fecha: timestamp.toLocaleDateString('es-BO'),
          hora: timestamp.toLocaleTimeString('es-BO', { hour: '2-digit', minute: '2-digit' }),
          rawDate: timestamp.toISOString(),
          clienteMesa: customerTag.trim() || 'Venta Rápida', 
          productos: cart.map(item => ({
            id: item.id,
            nombre: item.nombre,
            cantidad: item.cantidad,
            precio: item.precio,
            costo: getProductCost(item.nombre),
            subtotal: item.precio * item.cantidad,
            ingredienteAsociadoId: item.ingredienteAsociadoId || null
          })),
          subtotal: cartSubtotal,
          descuento: discount,
          total: cartTotal,
          metodoPago: paymentMethod,
          montoRecibido: paymentMethod === 'Efectivo' ? parseFloat(cashReceived || cartTotal) : cartTotal,
          usuario: currentUser?.nombre || 'Desconocido',
          rolUsuario: currentUser?.rol || 'Ninguno',
          status: 'COMPLETA',
          observaciones: ''
        };

        setIngredients(prevIngredients => {
          return (prevIngredients || []).map(ing => {
            if (!ing) return ing;
            let directDeduction = 0;
            cart.forEach(cartItem => {
              const recipe = RECIPES[cartItem.nombre];
              if (recipe) {
                const ingredientRequirement = recipe.find(r => r.ingredienteId === ing.id);
                if (ingredientRequirement) {
                  directDeduction += (ingredientRequirement.cantidad * cartItem.cantidad);
                }
              }
              if (cartItem.ingredienteAsociadoId && cartItem.ingredienteAsociadoId === ing.id) {
                directDeduction += cartItem.cantidad; 
              }
            });
            return {
              ...ing,
              stock: Math.max(0, parseFloat((ing.stock - directDeduction).toFixed(2)))
            };
          });
        });

        setSales(prevSales => [saleRecord, ...prevSales]);
        setLastSavedSale(saleRecord);
        setIsCheckoutOpen(false);
        setIsPrintModalOpen(true);
        logAction(`Venta registrada en nube #${saleId} por Bs ${cartTotal}`);
        showToast(`Venta #${saleId} registrada y stock actualizado correctamente`, 'success');
        setIsSavingSale(false);
      };

      const handleVoidSale = (saleId) => {
        if (currentUser?.rol !== 'Administrador') {
          showToast('Solo el Administrador puede anular ventas', 'error');
          return;
        }

        const saleToVoid = sales.find(s => s && s.id === saleId);
        if (!saleToVoid) return;

        if (saleToVoid.status === 'ANULADA') {
          showToast('Esta venta ya está anulada', 'warning');
          return;
        }

        const motivo = window.prompt('Motivo obligatorio de la anulación:');
        if (motivo === null) return;

        if (motivo.trim().length < 3) {
          showToast('Debes indicar un motivo válido', 'error');
          return;
        }

        showConfirmation(
          '¿Confirmar anulación de venta?',
          'La venta será anulada y el inventario será devuelto en una sola operación segura.',
          async () => {
            try {
              const response = await fetch(
                `${SUPABASE_URL}/rest/v1/rpc/anular_venta_completa`,
                {
                  method: 'POST',
                  headers: getCloudHeaders(),
                  body: JSON.stringify({
                    p_empresa_id: activeCompanyId,
                    p_venta_id: Number(saleId),
                    p_motivo: motivo.trim()
                  })
                }
              );

              const result = await response.json();

              if (!response.ok) {
                console.error('Error transacción anulación:', result);
                showToast('La venta no fue anulada. Ningún dato fue modificado.', 'error');
                return;
              }

              setSales(prev => (prev || []).map(s =>
                s && s.id === saleId
                  ? {
                      ...s,
                      status: 'ANULADA',
                      motivoAnulacion: motivo.trim(),
                      fechaAnulacion: new Date().toISOString()
                    }
                  : s
              ));

              if (selectedHistorySale && selectedHistorySale.id === saleId) {
                setSelectedHistorySale(prev => ({
                  ...prev,
                  status: 'ANULADA',
                  motivoAnulacion: motivo.trim(),
                  fechaAnulacion: new Date().toISOString()
                }));
              }

              // Recargar inventario desde la nube para reflejar exactamente
              // la devolución realizada por la transacción SQL.
              try {
                const inventoryResponse = await fetch(
                  `${SUPABASE_URL}/rest/v1/inventario?empresa_id=eq.${encodeURIComponent(activeCompanyId)}&activo=eq.true&select=*`,
                  { headers: getCloudHeaders() }
                );
                const inventoryRows = await inventoryResponse.json();

                if (inventoryResponse.ok && Array.isArray(inventoryRows)) {
                  setIngredients(inventoryRows.map(row => ({
                    id: `cloud-inv-${row.id}`,
                    cloudId: row.id,
                    empresaId: row.empresa_id,
                    nombre: row.nombre,
                    unidad: row.unidad,
                    stock: Number(row.stock_actual) || 0,
                    stockActual: Number(row.stock_actual) || 0,
                    stock_actual: Number(row.stock_actual) || 0,
                    stockMinimo: Number(row.stock_minimo) || 0,
                    stock_minimo: Number(row.stock_minimo) || 0,
                    porcionesPorUnidad: Number(row.porciones_por_unidad) || 1,
                    porciones_por_unidad: Number(row.porciones_por_unidad) || 1,
                    costo: Number(row.costo_unitario) || 0,
                    costoUnitario: Number(row.costo_unitario) || 0,
                    costo_unitario: Number(row.costo_unitario) || 0,
                    activo: row.activo !== false
                  })));
                }
              } catch (refreshError) {
                console.error('Error refrescando inventario:', refreshError);
              }

              logAction(`Anulación transaccional del Ticket #${saleId}. Motivo: ${motivo.trim()}`);
              showToast(`Venta #${saleId} anulada y stock devuelto`, 'warning');
            } catch (error) {
              console.error('Error de conexión al anular:', error);
              showToast('Error de conexión. La anulación no fue confirmada.', 'error');
            }
          },
          'Sí, Anular'
        );
      };

      // BACKUPS & SYSTEM RESTORES
      const handleBackupSystem = () => {
        const databaseBackup = {
          sales,
          products,
          ingredients,
          expenses,
          logoUrl,
          activeRegister,
          registerHistory,
          restaurantConfig,
          printConfig,
          auditLogs,
          backupDate: new Date().toISOString()
        };
        
        const timestamp = new Date();
        const newBackupLog = {
          id: Date.now(),
          fecha: timestamp.toLocaleDateString('es-BO') + ' ' + timestamp.toLocaleTimeString('es-BO'),
          usuario: currentUser?.nombre || 'Desconocido',
          tipo: 'Local & Descargado',
          tamanio: (JSON.stringify(databaseBackup).length / 1024).toFixed(2) + ' KB'
        };

        setLocalBackups(prev => [newBackupLog, ...prev]);

        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(databaseBackup, null, 2));
        const downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", `ElObeliscoPOS_Backup_${new Date().toISOString().split('T')[0]}.json`);
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
        
        logAction('Copia de seguridad del sistema exportada como JSON');
        showToast('Respaldo del sistema descargado correctamente', 'success');
      };

      const handleRestoreSystem = (event) => {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const parsedData = JSON.parse(e.target.result);
            if (parsedData.sales && parsedData.products && parsedData.ingredients) {
              setSales(parsedData.sales);
              setProducts(parsedData.products);
              setIngredients(parsedData.ingredients);
              if (parsedData.expenses) setExpenses(parsedData.expenses);
              if (parsedData.registerHistory) setRegisterHistory(parsedData.registerHistory);
              if (parsedData.activeRegister !== undefined) setActiveRegister(parsedData.activeRegister);
              if (parsedData.restaurantConfig) setRestaurantConfig(parsedData.restaurantConfig);
              if (parsedData.printConfig) setPrintConfig(parsedData.printConfig);
              if (parsedData.auditLogs) setAuditLogs(parsedData.auditLogs);
              if (parsedData.logoUrl) {
                setLogoUrl(parsedData.logoUrl);
                localStorage.setItem('obelisco_logo_v3', parsedData.logoUrl);
              }
              logAction('Restauración completa de base de datos desde respaldo externo');
              showToast('¡Sistema restaurado con éxito a partir del archivo de respaldo!', 'success');
            } else {
              showToast('Formato de archivo de respaldo no válido', 'error');
            }
          } catch (err) {
            showToast('Error al leer el archivo de base de datos', 'error');
          }
        };
        reader.readAsText(file);
      };

      // PRINT AUTO-TRIGGER LOGIC
      useEffect(() => {
        if (isPrintModalOpen && lastSavedSale) {
          if (printConfig.imprimirAmbosAuto) {
            triggerPrint('both', lastSavedSale);
          } else {
            if (printConfig.imprimirTicketAuto && printConfig.imprimirComandaAuto) {
              triggerPrint('both', lastSavedSale);
            } else if (printConfig.imprimirTicketAuto) {
              triggerPrint('ticket', lastSavedSale);
            } else if (printConfig.imprimirComandaAuto) {
              triggerPrint('comanda', lastSavedSale);
            }
          }
        }
      }, [isPrintModalOpen, lastSavedSale]);

      const handleAddExpense = async (e) => {
        e.preventDefault();
        if (!expenseForm.descripcion || !expenseForm.monto) {
          showToast('Por favor, llena todos los campos', 'error');
          return;
        }

        try {
          const expenseDate = new Date(`${expenseForm.fecha}T12:00:00`).toISOString();

          const response = await fetch(`${SUPABASE_URL}/rest/v1/gastos`, {
            method: 'POST',
            headers: {
              ...getCloudHeaders(),
              'Prefer': 'return=representation'
            },
            body: JSON.stringify({
              empresa_id: activeCompanyId,
              concepto: expenseForm.descripcion.trim(),
              monto: parseFloat(expenseForm.monto),

              usuario_nombre: currentUser?.nombre || 'Desconocido',
              fecha_gasto: expenseDate
            })
          });

            return;

          const row = rows[0];

            cloudId: row.id,
            empresaId: row.empresa_id,
            fecha: new Date(row.fecha_gasto).toISOString().split('T')[0],
            rawDate: row.fecha_gasto,
            descripcion: row.concepto,
            monto: Number(row.monto) || 0,
            categoria: row.categoria || 'Otros',
            usuario: row.usuario_nombre || 'Desconocido'
          };

          setExpenses(prev => [newExpense, ...prev]);
          setExpenseForm({
            fecha: new Date().toISOString().split('T')[0],
            descripcion: '',
            monto: '',
            categoria: 'Mercadería'
          });

          logAction(`Gasto guardado en nube: ${newExpense.descripcion} por Bs ${newExpense.monto}`);
          showToast('Gasto guardado en la nube', 'success');
        } catch (error) {
          showToast('Error de conexión al guardar el gasto', 'error');
        }
      };

      const handleDeleteExpense = (id) => {
        showConfirmation(
          '¿Eliminar Gasto?',
          '¿Estás seguro de que deseas eliminar permanentemente este registro de gasto?',
          async () => {
            try {
              const expense = expenses.find(exp => exp && exp.id === id);
              const cloudId = expense?.cloudId || String(id).replace('cloud-exp-', '');

              const response = await fetch(
                `${SUPABASE_URL}/rest/v1/gastos?id=eq.${encodeURIComponent(cloudId)}&empresa_id=eq.${encodeURIComponent(activeCompanyId)}`,
                {
                  method: 'DELETE',
                  headers: getCloudHeaders()
                }
              );

              if (!response.ok) {
                showToast('No se pudo eliminar el gasto de la nube', 'error');
                return;
              }

              setExpenses(prev => prev.filter(exp => exp && exp.id !== id));
              logAction('Eliminación de gasto en nube');
              showToast('Gasto eliminado de la nube', 'warning');
            } catch (error) {
              showToast('Error de conexión al eliminar el gasto', 'error');
            }
          }
        );
      };

      const getCloudHeaders = () => {
        const token = sessionStorage.getItem('obpos_cloud_access_token');
        return {
          'apikey': SUPABASE_PUBLISHABLE_KEY,
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json'
        };
      };

      const handleAddProduct = async (e) => {
        e.preventDefault();
        if (!newProductForm.nombre || !newProductForm.precio || !newProductForm.costo) {
          showToast('Por favor, completa el nombre, costo y precio del producto', 'error');
          return;
        }

        try {
          const categoryResponse = await fetch(
            `${SUPABASE_URL}/rest/v1/categorias?empresa_id=eq.${encodeURIComponent(activeCompanyId)}&nombre=eq.${encodeURIComponent(newProductForm.categoria)}&select=id&limit=1`,
            { headers: getCloudHeaders() }
          );
          const categoryRows = await categoryResponse.json();

          if (!categoryResponse.ok || !Array.isArray(categoryRows) || categoryRows.length === 0) {
            showToast('No se encontró la categoría en la nube', 'error');
            return;
          }

          const createResponse = await fetch(`${SUPABASE_URL}/rest/v1/productos`, {
            method: 'POST',
            headers: {
              ...getCloudHeaders(),
              'Prefer': 'return=representation'
            },
            body: JSON.stringify({
              empresa_id: activeCompanyId,
              categoria_id: categoryRows[0].id,
              nombre: newProductForm.nombre.trim(),
              precio: parseFloat(newProductForm.precio),
              emoji: newProductForm.emoji || '🍽️',
              activo: true
            })
          });

          const createdRows = await createResponse.json();
          if (!createResponse.ok || !Array.isArray(createdRows) || createdRows.length === 0) {
            showToast('No se pudo guardar el producto en la nube', 'error');
            return;
          }

          const row = createdRows[0];
          const newProduct = {
            id: `cloud-${row.id}`,
            cloudId: row.id,
            empresaId: activeCompanyId,
            nombre: row.nombre,
            precio: Number(row.precio) || 0,
            costo: parseFloat(newProductForm.costo),
            categoria: newProductForm.categoria,
            emoji: newProductForm.emoji || '🍽️',
            imagen: '',
            descripcion: newProductForm.descripcion || 'Sin descripción.',
            tiempoPreparacion: parseInt(newProductForm.tiempoPreparacion) || 10,
            destacado: newProductForm.destacado,
            disponible: row.activo !== false,
            ingredienteAsociadoId: newProductForm.ingredienteAsociadoId || null
          };

          setProducts(prev => [...prev, newProduct]);
          setNewProductForm({
            nombre: '',
            precio: '',
            costo: '',
            categoria: newProductForm.categoria,
            emoji: newProductForm.categoria === CATEGORIES.COMIDAS ? '🍔' : '🥤',
            imagen: '',
            descripcion: '',
            tiempoPreparacion: '10',
            destacado: false,
            ingredienteAsociadoId: ''
          });

          logAction(`Plato añadido a la nube: ${newProduct.nombre} por Bs ${newProduct.precio}`);
          showToast(`¡${newProduct.nombre} guardado en la nube!`, 'success');
        } catch (error) {
          showToast('Error de conexión al guardar el producto', 'error');
        }

          '¿Eliminar del Menú?',

          async () => {
            try {
              const product = products.find(p => p && p.id === productId);
              const cloudId = product?.cloudId || String(productId).replace('cloud-', '');

              const response = await fetch(
                `${SUPABASE_URL}/rest/v1/productos?id=eq.${encodeURIComponent(cloudId)}&empresa_id=eq.${encodeURIComponent(activeCompanyId)}`,
                {
                  method: 'DELETE',
                  headers: getCloudHeaders()
                }
              );

              if (!response.ok) {
                showToast('No se pudo eliminar el producto de la nube', 'error');
                return;
              }

              setProducts(prev => prev.filter(p => p && p.id !== productId));
              logAction(`Eliminación de plato en nube: ${productName}`);
              showToast(`Eliminado: ${productName}`, 'warning');
            } catch (error) {
              showToast('Error de conexión al eliminar', 'error');
            }
          }
        );

          const response = await fetch(
            `${SUPABASE_URL}/rest/v1/productos?id=eq.${encodeURIComponent(cloudId)}&empresa_id=eq.${encodeURIComponent(activeCompanyId)}`,
            {
              method: 'PATCH',
              headers: getCloudHeaders(),
              body: JSON.stringify({ activo: state })
            }
          );

          if (!response.ok) {
            showToast('No se pudo actualizar la disponibilidad en la nube', 'error');
            return;
          }

          setProducts(prev => prev.map(p => p && p.id === productId ? { ...p, disponible: state } : p));
          logAction(`Disponibilidad nube para ${productId}: ${state}`);
          showToast('Disponibilidad actualizada en la nube', 'success');

        const unidad = (newIngredientForm.unidad || '').trim();
        const stockValue = Number(newIngredientForm.stockActual || newIngredientForm.stock || 0);
        const minValue = Number(newIngredientForm.stockMinimo || 0);
        const costValue = Number(newIngredientForm.costoUnitario || newIngredientForm.costo || 0);

        if (!nombre || !unidad) {
          showToast('Completa el nombre y la unidad del insumo', 'error');
          return;
        }

        try {
          const response = await fetch(`${SUPABASE_URL}/rest/v1/inventario`, {
            method: 'POST',
            headers: {
              ...getCloudHeaders(),
              'Prefer': 'return=representation'

            body: JSON.stringify({

              stock_actual: stockValue,

              costo_unitario: costValue,
              activo: true,

            return;

            empresaId: row.empresa_id,

            activo: row.activo !== false

            porcionesPorUnidad: '',
            stockActual: '',
            stockMinimo: '',
            costoUnitario: ''
          });

        const wb = XLSX.utils.book_new();
        const append = (rows, name) => XLSX.utils.book_append_sheet(
          wb, XLSX.utils.json_to_sheet(rows.length ? rows : [{ Informacion: 'Sin registros' }]), name
        );

        append(activeCompanySales.map(s => ({
          ID: s.id, Fecha: s.rawDate || s.fecha || '', Cajero: s.usuario || '',
          Metodo_Pago: s.metodoPago || '', Total_Bs: Number(s.total || 0),
          Estado: s.status || 'COMPLETA', Motivo_Anulacion: s.motivoAnulacion || ''
        })), 'Ventas');

        append(activeCompanyExpenses.map(e => ({
          Fecha: e.rawDate || e.fecha || '', Descripcion: e.descripcion || '',
          Categoria: e.categoria || '', Monto_Bs: Number(e.monto || 0)
        })), 'Gastos');

        append(purchases.map(c => {
          const p = suppliers.find(x => Number(x.id) === Number(c.proveedor_id));
          const i = activeCompanyIngredients.find(x => Number(x.id) === Number(c.inventario_id));
          return {
            Fecha: c.fecha || '', Producto: i?.nombre || `Producto #${c.inventario_id}`,
            Proveedor: p?.nombre || 'Sin proveedor', Cantidad: Number(c.cantidad || 0),
            Costo_Unitario_Bs: Number(c.costo_unitario || 0), Total_Bs: Number(c.total || 0)
          };
        }), 'Compras');

        append(activeCompanyIngredients.map(i => {
          const current = Number(i.stock_actual ?? i.stock ?? i.cantidad ?? 0);
          const minimum = Number(i.stock_minimo ?? i.stockMinimo ?? 5);
          return {
            Producto: i.nombre || '', Unidad: i.unidad || '', Stock_Actual: current,
            Stock_Minimo: minimum, Estado: current <= 0 ? 'AGOTADO' : current <= minimum ? 'STOCK BAJO' : 'NORMAL'
          };
        }), 'Inventario');

        XLSX.writeFile(wb, `OBPOS_${activeCompanyId}_${new Date().toISOString().slice(0,10)}.xlsx`);
        logAction('Exportación completa a Excel');
        showToast('Archivo Excel generado correctamente', 'success');
      };

      const productProfitability = useMemo(() => {
        return activeCompanyProducts.map(product => {
          const productId = Number(product.cloudId || String(product.id).replace('cloud-', ''));
          const recipeRows = cloudRecipes.filter(r => Number(r.producto_id) === productId);

          const estimatedCost = recipeRows.reduce((sum, recipe) => {
            const ingredient = activeCompanyIngredients.find(i =>
              Number(i.cloudId || String(i.id).replace('cloud-inv-', '')) === Number(recipe.inventario_id)
            );
            if (!ingredient) return sum;

            const yieldPerUnit = Number(
              ingredient.porciones_por_unidad ?? ingredient.porcionesPorUnidad ?? 1
            ) || 1;
            const costPerStockUnit = Number(
              ingredient.costo_unitario ?? ingredient.costoUnitario ?? ingredient.costo ?? 0
            ) || 0;
            const stockUnitsUsed = Number(recipe.cantidad || 0) / yieldPerUnit;
            return sum + (stockUnitsUsed * costPerStockUnit);
          }, 0);

          const price = Number(product.precio || 0);
          const profit = price - estimatedCost;
          const margin = price > 0 ? (profit / price) * 100 : 0;

          return {
            ...product,
            estimatedCost,
            profit,
            margin,
            hasRecipe: recipeRows.length > 0
          };
        });

      const renderReportsTab = () => {
        const visibleSalesForReports = activeCompanySales.filter(s => {
          if (!s) return false;
          if (s.status === 'ANULADA') return false;
          if (currentUser?.rol === 'Cajero' && s.usuario !== currentUser?.nombre && !isSuperAdminLoggedIn) return false;
          
          const todayStr = new Date().toLocaleDateString('es-BO');
          if (currentUser?.rol === 'Cajero' && !isSuperAdminLoggedIn && !historyFilters.fecha && !historyFilters.mes) {
            if (s.fecha !== todayStr) return false;
          } else {
            if (historyFilters.fecha) {
              const selectedDate = new Date(historyFilters.fecha + "T00:00:00").toLocaleDateString('es-BO');
              if (s.fecha !== selectedDate) return false;
            }
            if (historyFilters.mes) {
              const [filterYear, filterMonth] = historyFilters.mes.split('-').map(Number);
              const saleDate = new Date(s.rawDate || s.timestamp || '');
              let saleYear, saleMonth;

              if (!Number.isNaN(saleDate.getTime())) {
                saleYear = saleDate.getFullYear();
                saleMonth = saleDate.getMonth() + 1;
              } else if (s.fecha) {
                const parts = String(s.fecha).split('/');
                if (parts.length === 3) {
                  saleMonth = Number(parts[1]);
                  saleYear = Number(parts[2]);
                }

              if (saleYear !== filterYear || saleMonth !== filterMonth) return false;
            }

          return true;

          (sale.productos || []).forEach(p => {

                            {p.hasRecipe ? `Bs ${p.profit.toFixed(2)}` : '—'}

            <div className="space-y-6 font-mono">

                      <div className="space-y-3">
                        {(() => {
                          const productMap = {};
                          visibleSalesForReports.forEach(sale => {
                            (sale.productos || sale.items || []).forEach(item => {
                              const name = item.nombre || item.name || item.producto || 'Producto';
                              const qty = Number(item.cantidad || item.qty || 1);
                              productMap[name] = (productMap[name] || 0) + qty;
                            });
                          });
                          const ranking = Object.entries(productMap).sort((a,b) => b[1] - a[1]).slice(0,8);
                          return ranking.length === 0
                            ? <p className="text-xs text-zinc-500 text-center py-6">No hay ventas en el periodo.</p>

                      <div className="space-y-3">
                        {(() => {
                          const hourMap = {};
                          visibleSalesForReports.forEach(sale => {
                            const d = new Date(sale.rawDate || sale.timestamp || '');
                            if (!Number.isNaN(d.getTime())) {
                              const hour = d.getHours();
                              const label = `${String(hour).padStart(2,'0')}:00 - ${String((hour + 1) % 24).padStart(2,'0')}:00`;
                              if (!hourMap[label]) hourMap[label] = { total: 0, pedidos: 0 };
                              hourMap[label].total += Number(sale.total) || 0;
                              hourMap[label].pedidos += 1;
                            }
                          });
                          const ranking = Object.entries(hourMap).sort((a,b) => b[1].total - a[1].total).slice(0,8);
                          return ranking.length === 0
                            ? <p className="text-xs text-zinc-500 text-center py-6">No hay horarios registrados.</p>
                            : ranking.map(([hour, data], index) => (
                              <div key={hour} className="flex justify-between items-center py-2 border-b border-zinc-800 text-xs">

                                  <span className="font-bold text-zinc-300">#{index + 1} {hour}</span>

                      <label className="text-[9px] uppercase font-bold text-zinc-500 block mb-1">Filtrar por Mes</label>
                      <input

      };

      const updateCloudInventoryStock = async (ingredient, delta, silent = false) => {
        const nextStock = Math.max(0, Number(ingredient.stock || 0) + delta);
        try {
          const response = await fetch(
            `${SUPABASE_URL}/rest/v1/inventario?id=eq.${encodeURIComponent(ingredient.cloudId)}&empresa_id=eq.${encodeURIComponent(activeCompanyId)}`,
            {
              method: 'PATCH',
              headers: getCloudHeaders(),
              body: JSON.stringify({
                stock_actual: nextStock,
                fecha_actualizacion: new Date().toISOString()
              })
            }
          );

          if (!response.ok) {
            showToast('No se pudo actualizar el stock en la nube', 'error');
            return;
          }

          setIngredients(prev => prev.map(i =>
            i && i.id === ingredient.id
              ? { ...i, stock: nextStock, stockActual: nextStock }
              : i
          ));
          if (!silent) showToast(`${ingredient.nombre}: ${delta > 0 ? '+' : ''}${delta}`, 'success');
        } catch (error) {
          showToast('Error de conexión al actualizar stock', 'error');
        }
      };

      const editCloudIngredient = async (ingredient) => {
        const nombre = window.prompt('Nombre del insumo:', ingredient.nombre);
        if (nombre === null) return;
        const stockMinimo = window.prompt('Stock mínimo:', ingredient.stockMinimo);
        if (stockMinimo === null) return;
        const costoUnitario = window.prompt('Costo unitario (Bs):', ingredient.costoUnitario);
        if (costoUnitario === null) return;

        try {
          const response = await fetch(
            `${SUPABASE_URL}/rest/v1/inventario?id=eq.${encodeURIComponent(ingredient.cloudId)}&empresa_id=eq.${encodeURIComponent(activeCompanyId)}`,
            {
              method: 'PATCH',
              headers: getCloudHeaders(),
              body: JSON.stringify({
                nombre: nombre.trim() || ingredient.nombre,
                stock_minimo: Math.max(0, Number(stockMinimo) || 0),
                costo_unitario: Math.max(0, Number(costoUnitario) || 0),
                fecha_actualizacion: new Date().toISOString()
              })
            }
          );

          if (!response.ok) {
            showToast('No se pudo editar el insumo en la nube', 'error');
            return;
          }

          setIngredients(prev => prev.map(i =>
            i && i.id === ingredient.id
              ? {
                  ...i,
                  nombre: nombre.trim() || ingredient.nombre,
                  stockMinimo: Math.max(0, Number(stockMinimo) || 0),
                  costoUnitario: Math.max(0, Number(costoUnitario) || 0),
                  costo: Math.max(0, Number(costoUnitario) || 0)
                }
              : i
          ));
          showToast('Insumo actualizado en la nube', 'success');
        } catch (error) {
          showToast('Error de conexión al editar el insumo', 'error');
        }
      };

      const deleteCloudIngredient = (ingredient) => {
        showConfirmation(
          '¿Eliminar insumo?',
          `¿Deseas eliminar "${ingredient.nombre}" del inventario?`,
          async () => {
            try {
              const response = await fetch(
                `${SUPABASE_URL}/rest/v1/inventario?id=eq.${encodeURIComponent(ingredient.cloudId)}&empresa_id=eq.${encodeURIComponent(activeCompanyId)}`,
                {
                  method: 'PATCH',
                  headers: getCloudHeaders(),
                  body: JSON.stringify({
                    activo: false,
                    fecha_actualizacion: new Date().toISOString()
                  })
                }
              );

              if (!response.ok) {
                showToast('No se pudo eliminar el insumo de la nube', 'error');
                return;
              }

              setIngredients(prev => prev.filter(i => i && i.id !== ingredient.id));
              showToast(`${ingredient.nombre} eliminado`, 'warning');
            } catch (error) {
              showToast('Error de conexión al eliminar el insumo', 'error');
            }
          }
        );
      };

      useEffect(() => {
        if (!activeCompanyId || !currentUser) return;

        const loadPurchasingData = async () => {
          try {
            const headers = getCloudHeaders();
            const [suppliersRes, purchasesRes, recipesRes] = await Promise.all([
              fetch(`${SUPABASE_URL}/rest/v1/proveedores?empresa_id=eq.${encodeURIComponent(activeCompanyId)}&activo=eq.true&select=*&order=nombre.asc`, { headers }),
              fetch(`${SUPABASE_URL}/rest/v1/compras?empresa_id=eq.${encodeURIComponent(activeCompanyId)}&select=*&order=fecha.desc`, { headers }),
              fetch(`${SUPABASE_URL}/rest/v1/recetas?empresa_id=eq.${encodeURIComponent(activeCompanyId)}&select=*&order=id.asc`, { headers })
            ]);
            const supplierRows = await suppliersRes.json();
            const purchaseRows = await purchasesRes.json();
            const recipeRows = await recipesRes.json();
            if (suppliersRes.ok && Array.isArray(supplierRows)) setSuppliers(supplierRows);
            if (purchasesRes.ok && Array.isArray(purchaseRows)) setPurchases(purchaseRows);
            if (recipesRes.ok && Array.isArray(recipeRows)) setCloudRecipes(recipeRows);
          } catch (error) {
            console.error('Error cargando compras y proveedores:', error);
          }
        };

        loadPurchasingData();
      }, [activeCompanyId, currentUser?.id]);

      const handleCreateSupplier = async (e) => {
        e.preventDefault();
        if (!supplierForm.nombre.trim()) return;

        try {
          const response = await fetch(`${SUPABASE_URL}/rest/v1/proveedores`, {
            method: 'POST',
            headers: { ...getCloudHeaders(), 'Prefer': 'return=representation' },
            body: JSON.stringify({
              empresa_id: activeCompanyId,
              nombre: supplierForm.nombre.trim(),
              telefono: supplierForm.telefono.trim(),
              direccion: supplierForm.direccion.trim(),
              activo: true
            })
          });
          const rows = await response.json();
          if (!response.ok || !rows?.length) {
            showToast('No se pudo guardar el proveedor', 'error');
            return;
          }
          setSuppliers(prev => [...prev, rows[0]]);
          setSupplierForm({ nombre: '', telefono: '', direccion: '' });
          showToast('Proveedor guardado en la nube', 'success');
        } catch {
          showToast('Error de conexión al guardar proveedor', 'error');
        }
      };

      const handleRegisterPurchase = async (e) => {
        e.preventDefault();

        const qty = Number(purchaseForm.cantidad);
        const unitCost = Number(purchaseForm.costoUnitario);
        const item = activeCompanyIngredients.find(
          i => String(i.id) === String(purchaseForm.inventarioId)
        );

        if (!item || qty <= 0 || unitCost < 0) {
          showToast('Completa correctamente los datos de la compra', 'error');
          return;
        }

        try {
          const response = await fetch(
            `${SUPABASE_URL}/rest/v1/rpc/registrar_compra_completa`,
            {
              method: 'POST',
              headers: getCloudHeaders(),
              body: JSON.stringify({
                p_empresa_id: activeCompanyId,
                p_proveedor_id: purchaseForm.proveedorId
                  ? Number(purchaseForm.proveedorId)
                  : null,
                p_inventario_id: Number(item.cloudId || String(item.id).replace('cloud-inv-', '')),
                p_cantidad: qty,
                p_costo_unitario: unitCost,
                p_usuario_nombre: currentUser?.nombre || 'Administrador'
              })
            }
          );

          const result = await response.json();

          if (!response.ok) {
            console.error('Error transacción compra:', result);
            showToast('La compra no se aplicó. Ningún dato fue modificado.', 'error');
            return;
          }

          const total = qty * unitCost;
          const purchaseId = Number(result);

          setPurchases(prev => [{
            id: purchaseId,
            empresa_id: activeCompanyId,
            proveedor_id: purchaseForm.proveedorId
              ? Number(purchaseForm.proveedorId)
              : null,
            inventario_id: Number(item.cloudId || String(item.id).replace('cloud-inv-', '')),
            cantidad: qty,
            costo_unitario: unitCost,
            total,
            fecha: new Date().toISOString()
          }, ...prev]);

          setIngredients(prev => (prev || []).map(ing => {
            if (!ing || String(ing.id) !== String(item.id)) return ing;
            const current = Number(
              ing.stock_actual ?? ing.stock ?? ing.cantidad ?? 0
            );
            return {
              ...ing,
              stock_actual: current + qty,
              stock: current + qty,
              costo_unitario: unitCost
            };
          }));

          setPurchaseForm({
            proveedorId: '',
            inventarioId: '',
            cantidad: '',
            costoUnitario: ''
          });

          logAction(
            `Compra transaccional #${purchaseId}: ${item.nombre}, ${qty} unidades, Bs ${total.toFixed(2)}`
          );
          showToast(
            'Compra, stock y gasto registrados correctamente',
            'success'
          );
        } catch (error) {
          console.error('Error de conexión en compra:', error);
          showToast(
            'Error de conexión. La operación no fue confirmada.',
            'error'
          );
        }
      };

      const handleAddRecipeIngredient = async (e) => {
        e.preventDefault();
        const productId = Number(recipeForm.productoId);
        const inventoryId = Number(recipeForm.inventarioId);
        const amount = Number(recipeForm.cantidad);
        if (!productId || !inventoryId || amount <= 0) {
          showToast('Completa correctamente la receta', 'error');
          return;
        }
        try {
          const response = await fetch(`${SUPABASE_URL}/rest/v1/recetas`, {
            method: 'POST',
            headers: { ...getCloudHeaders(), 'Prefer': 'return=representation' },
            body: JSON.stringify({
              empresa_id: activeCompanyId,
              producto_id: productId,
              inventario_id: inventoryId,
              cantidad: amount
            })
          });
          const rows = await response.json();
          if (!response.ok || !rows?.length) {
            showToast('No se pudo guardar. Verifica que el ingrediente no esté repetido.', 'error');
            return;
          }
          setCloudRecipes(prev => [...prev, rows[0]]);
          setRecipeForm(prev => ({ ...prev, inventarioId: '', cantidad: '' }));
          showToast('Ingrediente añadido a la receta', 'success');
        } catch {
          showToast('Error de conexión al guardar receta', 'error');
        }
      };

      const handleUpdateRecipeAmount = async (recipe) => {
        const amount = Number(recipeEditAmounts[recipe.id] ?? recipe.cantidad);
        if (amount <= 0) {
          showToast('La cantidad debe ser mayor a cero', 'error');
          return;
        }

        try {
          const response = await fetch(
            `${SUPABASE_URL}/rest/v1/recetas?id=eq.${recipe.id}&empresa_id=eq.${encodeURIComponent(activeCompanyId)}`,
            {
              method: 'PATCH',
              headers: getCloudHeaders(),
              body: JSON.stringify({ cantidad: amount })
            }
          );

          if (!response.ok) {
            showToast('No se pudo actualizar la cantidad', 'error');
            return;
          }

          setCloudRecipes(prev => prev.map(r =>
            r.id === recipe.id ? { ...r, cantidad: amount } : r
          ));
          setRecipeEditAmounts(prev => ({ ...prev, [recipe.id]: '' }));
          showToast('Cantidad de receta actualizada', 'success');
        } catch {
          showToast('Error de conexión al actualizar receta', 'error');
        }
      };

      const handleDeleteRecipeIngredient = async (recipe) => {
        try {
          const response = await fetch(
            `${SUPABASE_URL}/rest/v1/recetas?id=eq.${recipe.id}&empresa_id=eq.${encodeURIComponent(activeCompanyId)}`,
            { method: 'DELETE', headers: getCloudHeaders() }
          );
          if (!response.ok) {
            showToast('No se pudo quitar el ingrediente', 'error');
            return;
          }
          setCloudRecipes(prev => prev.filter(r => r.id !== recipe.id));
          showToast('Ingrediente quitado de la receta', 'success');
        } catch {
          showToast('Error de conexión', 'error');
        }
      };

      const handleEditSupplier = async (supplier) => {
        const nombre = window.prompt('Nombre del proveedor:', supplier.nombre);
        if (nombre === null || !nombre.trim()) return;
        const telefono = window.prompt('Teléfono:', supplier.telefono || '');
        if (telefono === null) return;
        const direccion = window.prompt('Dirección:', supplier.direccion || '');
        if (direccion === null) return;

        try {
          const response = await fetch(
            `${SUPABASE_URL}/rest/v1/proveedores?id=eq.${supplier.id}&empresa_id=eq.${encodeURIComponent(activeCompanyId)}`,
            {
              method: 'PATCH',
              headers: getCloudHeaders(),
              body: JSON.stringify({
                nombre: nombre.trim(),
                telefono: telefono.trim(),
                direccion: direccion.trim()
              })
            }
          );
          if (!response.ok) {
            showToast('No se pudo actualizar el proveedor', 'error');
            return;
          }
          setSuppliers(prev => prev.map(p => p.id === supplier.id
            ? { ...p, nombre: nombre.trim(), telefono: telefono.trim(), direccion: direccion.trim() }
            : p
          ));
          showToast('Proveedor actualizado', 'success');
        } catch {
          showToast('Error de conexión al actualizar proveedor', 'error');
        }
      };

      const handleDisableSupplier = async (supplier) => {
        if (!window.confirm(`¿Desactivar a ${supplier.nombre}?`)) return;
        try {
          const response = await fetch(
            `${SUPABASE_URL}/rest/v1/proveedores?id=eq.${supplier.id}&empresa_id=eq.${encodeURIComponent(activeCompanyId)}`,
            {
              method: 'PATCH',
              headers: getCloudHeaders(),
              body: JSON.stringify({ activo: false })
            }
          );
          if (!response.ok) {
            showToast('No se pudo desactivar el proveedor', 'error');
            return;
          }
          setSuppliers(prev => prev.filter(p => p.id !== supplier.id));
          showToast('Proveedor desactivado', 'success');
        } catch {
          showToast('Error de conexión al desactivar proveedor', 'error');
        }
      };

      const getStockAlerts = () => {
        const items = activeCompanyIngredients || [];
        const exhausted = items.filter(i => Number(i.stock_actual ?? i.stock ?? i.cantidad ?? 0) <= 0);
        const lowStock = items.filter(i => {
          const current = Number(i.stock_actual ?? i.stock ?? i.cantidad ?? 0);
          const minimum = Number(i.stock_minimo ?? i.stockMinimo ?? 5);
          return current > 0 && current <= minimum;
        });
        return { exhausted, lowStock };
      };

      const renderInventoryTab = () => {
        const stockAlerts = getStockAlerts();
        return (
          <div className="p-6 overflow-y-auto h-full space-y-6 no-scrollbar bg-brand-black fade-in text-left font-mono">
            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-b border-zinc-800 pb-4">
              <div>
                <h3 className="text-base font-black tracking-wider text-white">REPOSICIÓN DE STOCK Y CONTROL DE INGREDIENTES</h3>
                <p className="text-xs text-zinc-500">Maneja directamente el inventario físico utilizado por las recetas.</p>
              </div>
            </div>

            {currentUser?.rol === 'Administrador' && (
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                <div className="bg-brand-dark border border-zinc-800 rounded-2xl p-5">
                  <h4 className="font-black text-xs uppercase text-white mb-4">Registrar compra</h4>
                  <form onSubmit={handleRegisterPurchase} className="space-y-3">
                    <select required value={purchaseForm.inventarioId}
                      onChange={e => setPurchaseForm({...purchaseForm, inventarioId:e.target.value})}
                      className="w-full bg-brand-gray border border-zinc-700 rounded-xl p-3 text-xs text-white">
                      <option value="">Seleccionar producto</option>
                      {activeCompanyIngredients.map(i => <option key={i.id} value={i.id}>{i.nombre}</option>)}
                    </select>
                    <select value={purchaseForm.proveedorId}
                      onChange={e => setPurchaseForm({...purchaseForm, proveedorId:e.target.value})}
                      className="w-full bg-brand-gray border border-zinc-700 rounded-xl p-3 text-xs text-white">
                      <option value="">Sin proveedor</option>
                      {suppliers.map(p => <option key={p.id} value={p.id}>{p.nombre}</option>)}
                    </select>
                    <div className="grid grid-cols-2 gap-3">
                      <input required type="number" min="0.01" step="0.01" placeholder="Cantidad"
                        value={purchaseForm.cantidad}
                        onChange={e => setPurchaseForm({...purchaseForm, cantidad:e.target.value})}
                        className="bg-brand-gray border border-zinc-700 rounded-xl p-3 text-xs text-white" />
                      <input required type="number" min="0" step="0.01" placeholder="Costo unitario"
                        value={purchaseForm.costoUnitario}
                        onChange={e => setPurchaseForm({...purchaseForm, costoUnitario:e.target.value})}
                        className="bg-brand-gray border border-zinc-700 rounded-xl p-3 text-xs text-white" />
                    </div>
                    <p className="text-xs font-black text-amber-500">
                      Total: Bs {(Number(purchaseForm.cantidad || 0) * Number(purchaseForm.costoUnitario || 0)).toFixed(2)}
                    </p>
                    <button type="submit" className="w-full bg-brand-red text-white text-xs font-black rounded-xl p-3">
                      Registrar compra
                    </button>
                  </form>
                </div>

                <div className="bg-brand-dark border border-zinc-800 rounded-2xl p-5">
                  <h4 className="font-black text-xs uppercase text-white mb-4">Nuevo proveedor</h4>
                  <form onSubmit={handleCreateSupplier} className="space-y-3">
                    <input required placeholder="Nombre del proveedor" value={supplierForm.nombre}
                      onChange={e => setSupplierForm({...supplierForm, nombre:e.target.value})}
                      className="w-full bg-brand-gray border border-zinc-700 rounded-xl p-3 text-xs text-white" />
                    <input placeholder="Teléfono" value={supplierForm.telefono}
                      onChange={e => setSupplierForm({...supplierForm, telefono:e.target.value})}
                      className="w-full bg-brand-gray border border-zinc-700 rounded-xl p-3 text-xs text-white" />
                    <input placeholder="Dirección" value={supplierForm.direccion}
                      onChange={e => setSupplierForm({...supplierForm, direccion:e.target.value})}
                      className="w-full bg-brand-gray border border-zinc-700 rounded-xl p-3 text-xs text-white" />
                    <button type="submit" className="w-full bg-zinc-800 text-white text-xs font-black rounded-xl p-3">
                      Guardar proveedor
                    </button>
                  </form>
                  <div className="mt-4 text-[10px] text-zinc-500 font-bold">
                    {suppliers.length} proveedor(es) activo(s)
                  </div>
                </div>
              </div>
            )}

            {currentUser?.rol === 'Administrador' && (
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                <div className="bg-brand-dark border border-zinc-800 rounded-2xl p-5">
                  <h4 className="font-black text-xs uppercase text-white mb-4">Gestión de proveedores</h4>
                  <div className="space-y-2 max-h-80 overflow-y-auto custom-scrollbar">
                    {suppliers.length === 0 ? (
                      <p className="text-xs text-zinc-500 text-center py-5">No hay proveedores activos.</p>
                    ) : suppliers.map(supplier => (
                      <div key={supplier.id} className="bg-brand-black/40 border border-zinc-800 rounded-xl p-3">
                        <div className="flex justify-between items-start gap-3">
                          <div>
                            <p className="text-xs font-black text-white">{supplier.nombre}</p>

      const handleCreateCashier = async (e) => {
        e.preventDefault();
        const nombre = cashierForm.nombre.trim();
        const email = cashierForm.email.trim().toLowerCase();
        const password = cashierForm.password.trim();

        if (!nombre || !email || password.length < 6) {
          showToast('Ingresa nombre, correo y contraseña de al menos 6 caracteres', 'error');
          return;
        }

        try {
          const response = await fetch(`${SUPABASE_URL}/functions/v1/crear-cajero`, {
            method: 'POST',
            headers: {
              ...getCloudHeaders(),
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ nombre, email, password })
          });

          const result = await response.json();

          if (!response.ok || !result.success) {
            console.error('Error crear cajero Auth:', result);
            showToast(result.error || 'No se pudo crear el cajero', 'error');
            return;
          }

          const profilesResponse = await fetch(
            `${SUPABASE_URL}/rest/v1/perfiles?empresa_id=eq.${encodeURIComponent(activeCompanyId)}&select=*`,
            { headers: getCloudHeaders() }
          );
          const rows = await profilesResponse.json();
          if (profilesResponse.ok && Array.isArray(rows)) setCloudProfiles(rows);

          setCashierForm({ nombre: '', email: '', password: '' });
          showToast(`${nombre} creado con acceso individual`, 'success');
        } catch (error) {
          console.error('Error conexión crear cajero:', error);
          showToast('Error de conexión al crear cajero', 'error');
        }
      };

      const handleToggleCashier = async (profile) => {
        const nextActive = profile.activo === false;
        try {
          const response = await fetch(
            `${SUPABASE_URL}/rest/v1/perfiles?id=eq.${encodeURIComponent(profile.id)}&empresa_id=eq.${encodeURIComponent(activeCompanyId)}`,
            {
              method: 'PATCH',
              headers: getCloudHeaders(),
              body: JSON.stringify({ activo: nextActive })
            }
          );

          if (!response.ok) {
            showToast('No se pudo actualizar el cajero', 'error');
            return;
          }

          setCloudProfiles(prev => prev.map(p =>
            p.id === profile.id ? { ...p, activo: nextActive } : p
          ));
          showToast(nextActive ? 'Cajero activado' : 'Cajero desactivado', 'success');
        } catch (error) {
          showToast('Error de conexión al actualizar cajero', 'error');
        }
      };

      const handleMigrateCashierAuth = async (profile) => {
        const email = window.prompt(`Correo para ${profile.nombre}:`);
        if (email === null) return;
        const password = window.prompt(`Contraseña inicial para ${profile.nombre} (mínimo 6 caracteres):`);
        if (password === null) return;

        if (!email.trim() || password.trim().length < 6) {
          showToast('Ingresa un correo válido y contraseña de al menos 6 caracteres', 'error');
          return;
        }

        try {
          const response = await fetch(
            `${SUPABASE_URL}/functions/v1/migrar-perfil-auth`,
            {
              method: 'POST',
              headers: getCloudHeaders(),
              body: JSON.stringify({
                perfil_id: profile.id,
                email: email.trim().toLowerCase(),
                password: password.trim()
              })
            }
          );

          const result = await response.json();

          if (!response.ok || !result.success) {
            showToast(result.error || 'No se pudo migrar el perfil', 'error');
            return;
          }

          setCloudProfiles(prev => prev.map(p =>
            p.id === profile.id
              ? { ...p, email: result.perfil.email, auth_user_id: result.perfil.auth_user_id }
              : p
          ));

          showToast(`${profile.nombre} migrado a Auth correctamente`, 'success');
        } catch (error) {
          console.error('Error migración Auth:', error);
          showToast('Error de conexión al migrar perfil', 'error');
        }
      };

      const handleChangeCashierPassword = async (profile) => {
        const password = window.prompt(`Nueva contraseña para ${profile.nombre}:`);
        if (password === null) return;

        const cleanPassword = password.trim();

        if (cleanPassword.length < 6) {
          showToast('La contraseña debe tener al menos 6 caracteres', 'error');
          return;
        }

        try {
          const response = await fetch(
            `${SUPABASE_URL}/functions/v1/cambiar-password-usuario`,
            {
              method: 'POST',
              headers: getCloudHeaders(),
              body: JSON.stringify({
                perfil_id: profile.id,
                nueva_password: cleanPassword
              })
            }
          );

          const result = await response.json();

          if (!response.ok || !result.success) {
            showToast(
              result.error || 'No se pudo cambiar la contraseña del cajero',
              'error'
            );
            return;
          }

          showToast(
            `Contraseña Auth de ${profile.nombre} actualizada`,
            'success'
          );
        } catch (error) {
          console.error('Error al cambiar contraseña Auth:', error);
          showToast(
            'Error de conexión al cambiar contraseña',

                  // Fechas visibles en formato boliviano: DD/MM/YYYY.

                    const localDate = new Date(year, month - 1, day);
                    return Number.isNaN(localDate.getTime()) ? null : localDate;

      const renderCompanyAccess = () => {
        const handleCompanySubmit = async (e) => {
          e.preventDefault();

          const cleanId = companyIdField.trim().toUpperCase();
          const cleanPass = companyPassField.trim();

          setCompanyError('');

          try {
            const response = await fetch(
              `${SUPABASE_URL}/functions/v1/login-empresa`,
              {
                method: 'POST',
                headers: {
                  'apikey': SUPABASE_PUBLISHABLE_KEY,
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                  empresa_id: cleanId,
                  password: cleanPass
                })
              }
            );

            const result = await response.json();

            if (!response.ok || !result.success) {
              setCompanyError(
                result.error || 'ID de empresa o contraseña incorrectos.'
              );
              return;
            }

            const perfiles = Array.isArray(result.perfiles)
              ? result.perfiles
              : [];

            if (perfiles.length === 0) {
              setCompanyError('La empresa no tiene perfiles activos.');
              return;
            }

            setCloudProfiles(perfiles);

            const localCompany = companies.find(c => c.id === cleanId) || {};
            const cloudCompany = result.empresa || {};
            const cloudLicense = result.licencia || {};

            const company = {
              ...localCompany,
              ...cloudCompany,
              fechaVencimiento: cloudLicense.fecha_vencimiento,
              dias: calculateRemainingDays(cloudLicense.fecha_vencimiento)
            };

            setCompanies(prev => {
              const exists = prev.some(c => c.id === cleanId);
              return exists
                ? prev.map(c => c.id === cleanId ? { ...c, ...company } : c)
                : [...prev, company];
            });

            sessionStorage.removeItem('obpos_cloud_access_token');
            sessionStorage.removeItem('obpos_cloud_refresh_token');

            sessionStorage.setItem('obelisco_company_active', 'true');
            sessionStorage.setItem('obelisco_active_company', cleanId);
            sessionStorage.setItem('obelisco_session_active', 'true');

            setActiveCompanyId(cleanId);
            setCurrentUser(null);
            setTargetUser(null);
            setIsCompanyLoggedIn(true);
            setIsLoggedIn(false);
            setCompanyError('');

            const remainingDays = calculateRemainingDays(
              cloudLicense.fecha_vencimiento
            );

            if (remainingDays > 0 && remainingDays <= 3) {
              setLicenseWarning({
                companyId: cleanId,
                companyName: cloudCompany.nombre || cleanId,
                days: remainingDays
              });
            } else {
              setLicenseWarning(null);
            }

            showToast(
              `Empresa ${cloudCompany.nombre || cleanId} validada`,
              'success'
            );
          } catch (error) {
            console.error('Error login empresa:', error);
            setCompanyError(
              'No se pudo conectar con la nube. Revisa tu conexión a Internet.'
            );
